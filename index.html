<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tailwind Circular Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-slate-800 rounded-3xl border border-slate-700 shadow-2xl p-6 flex flex-col gap-5">
        
        <div class="bg-slate-950 p-5 rounded-2xl border border-slate-900 flex flex-col justify-end items-end min-h-[110px] gap-1 overflow-hidden">
            <div id="previous-display" class="text-sm font-medium text-slate-500 h-5 tracking-wide"></div>
            <div id="current-display" class="text-3xl font-bold text-white tracking-tight truncate w-full text-right">0</div>
        </div>

        <div class="grid grid-cols-4 gap-3.5">
            <button onclick="clearScreen()" class="col-span-2 bg-slate-700 hover:bg-slate-600 text-amber-400 font-bold p-4 rounded-full text-xl cursor-pointer transition duration-150">C</button>
            <button onclick="chooseOperation('%')" class="bg-slate-700 hover:bg-slate-600 text-blue-400 font-bold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">%</button>
            <button onclick="chooseOperation('/')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">÷</button>

            <button onclick="appendNumber('7')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">7</button>
            <button onclick="appendNumber('8')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">8</button>
            <button onclick="appendNumber('9')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">9</button>
            <button onclick="chooseOperation('*')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">×</button>

            <button onclick="appendNumber('4')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">4</button>
            <button onclick="appendNumber('5')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">5</button>
            <button onclick="appendNumber('6')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">6</button>
            <button onclick="chooseOperation('-')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">−</button>

            <button onclick="appendNumber('1')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">1</button>
            <button onclick="appendNumber('2')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">2</button>
            <button onclick="appendNumber('3')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">3</button>
            <button onclick="chooseOperation('+')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">+</button>

            <button onclick="appendNumber('0')" class="col-span-2 bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full text-xl cursor-pointer transition duration-150">0</button>
            <button onclick="appendNumber('.')" class="bg-slate-700/50 hover:bg-slate-600/70 text-white font-semibold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">.</button>
            <button onclick="calculate()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold p-4 rounded-full aspect-square text-xl cursor-pointer transition duration-150">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
